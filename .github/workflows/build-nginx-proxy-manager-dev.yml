name: Build & Publish Nginx Proxy Manager (dev)

on:
  push:
    branches: [development]
    paths:
      - "nginx-proxy-manager/**"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - ha_arch: amd64
            platform: linux/amd64
          - ha_arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.ha_arch }}
        uses: docker/build-push-action@v6
        with:
          context: nginx-proxy-manager
          file: nginx-proxy-manager/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/slopsync-labs/ha-app-nginx-proxy-manager/${{ matrix.ha_arch }}-addon-nginx-proxy-manager-dev:latest
          build-args: |
            BUILD_ARCH=${{ matrix.ha_arch }}

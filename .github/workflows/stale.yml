name: Close Stale Issues

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale issues
        uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          exempt-issue-labels: team
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-message: |
            This issue has been inactive for 60 days. If it's still relevant, please leave a comment to keep it open. Otherwise, it will be closed in 14 days.
          close-issue-message: |
            This issue was closed due to inactivity. Feel free to reopen it if you believe it's still relevant.
          remove-stale-when-updated: true
